baseURL = "http://chelseanbr.github.io/"
defaultContentLanguage = "en"
languageCode = "en"
enableEmoji = true
pygmentsStyle = "monokai"

title = "Chelsea Ramos"
showBackToTopButton = true # true or false for "back to top" button on posts and pages

theme = "gokarna"

# Automatically generate robots.txt
enableRobotsTXT = true

[menu]
  [[menu.main]]
    # Unique identifier for a menu item
    name = "Home"
    # You can add extra information before the name (HTML format is supported), such as icons
    pre = "<span data-feather='home'></span>"
    # You can add extra information after the name (HTML format is supported), such as icons
    post = ""
    url = "/"
    # Weights are used to determine the ordering
    weight = 1

  [[menu.main]]
    name = "Projects"
    pre = "<span data-feather='code'></span>"
    url = "/projects/"
    weight = 2

  [[menu.main]]
    name = "Posts"
    pre = "<span data-feather='edit-3'></span>"
    url = "/posts/"
    weight = 3

  [[menu.main]]
    name = "Tags"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 4

  [[menu.main]]
    name = "Fun"
    pre = "<span data-feather='smile'></span>"
    url = "/fun/"
    weight = 5

  [[menu.main]]
    identifier = "github"
    pre = "<span data-feather='github'></span>"
    url = "https://github.com/chelseanbr"
    weight = 6
  
  [[menu.main]]
    identifier = "email"
    pre = "<span data-feather='mail'></span>"
    url = "mailto:chelseanbr@utexas.edu"
    weight = 7

    # We use feather-icons: https://feathericons.com/

[params]
  # URL for the avatar on homepage
  avatarURL = "/images/avatar.jpeg"

  # Choose one of size-xs, size-s, size-m, size-l & size-xl. (Default: size-m)
  avatarSize = ""

  # Description to display on homepage
  description = "Machine Learning Engineer | MSAI @ UT Austin '26"

  # Accent color is displayed when you hover over <a> tags
  accentColor = "#F08080"

  # You can use this to inject any HTML in the <head> tag.
  # Ideal usecase for this is to import custom js/css or add your analytics snippet
  customHeadHTML = """
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZZN7G3R61K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-ZZN7G3R61K');
    </script>
  """

  # Keywords relevant for SEO
  metaKeywords = ["blog", "gokarna", "hugo"]

  # If you want to display posts on the homepage, the options are
  # "popular" (order posts by weight), "recent" (order posts by date)
  # or "" (do not display, default option)
  showPostsOnHomePage = "popular"

  # Footer text
  footer = "Chelsea Ramos"

  socialIcons = [
    {name = "linkedin", url = "https://linkedin.com/in/chelseanbr"},
    {name = "github", url = "https://github.com/chelseanbr"},
    {name = "medium", url = "https://medium.com/@chelseanbr"},
    {name = "instagram", url = "https://instagram.com/chelseawhatisee"},
    {name = "youtube", url = "https://youtube.com/@sweetpotatodreams"},
    {name = "email", url = "mailto:chelseanbr@utexas.edu"},
  ]

  customFooterHTML = '<script defer src="https://cloud.umami.is/script.js" data-website-id="0aac787e-52f6-4864-9ea5-93a7f6b47191"></script>'

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 3
    ordered = false

[minify]
    minifyOutput = true

[markup.goldmark.renderer]
  unsafe = true